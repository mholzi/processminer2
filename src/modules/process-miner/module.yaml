code: process-miner
name: "ProcessMiner: Banking Process Documentation"
header: "Banking process documentation with intelligent guidance"
subheader: "SME knowledge extraction with Process Journey Companion"
default_selected: false

# Variables from Core Config inserted:
## user_name
## communication_language
## document_output_language
## output_folder

process_output_folder:
  prompt: "Where should process documentation be stored?"
  default: "{output_folder}/processes"
  result: "{project-root}/{value}"

default_process_prefix:
  prompt:
    - "What prefix should be used for new process IDs?"
    - "Examples: COB (Client Onboarding), PAY (Payments), KYC (Know Your Customer)"
  default: "PROC"
  result: "{value}"

guidance_level:
  prompt:
    - "How detailed should the Companion's guidance be?"
    - "This affects how much context and explanation is provided."
  default: "balanced"
  result: "{value}"
  single-select:
    - value: "detailed"
      label: "Detailed - Full explanations, ideal for new users"
    - value: "balanced"
      label: "Balanced - Clear guidance with moderate detail"
    - value: "concise"
      label: "Concise - Direct and efficient, for experienced users"
