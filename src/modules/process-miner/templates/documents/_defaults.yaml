# ──────────────────────────────────────────────
# Confidence Propagation
# ──────────────────────────────────────────────
# Downstream document confidence cannot exceed the confidence of the
# upstream section whose IDs it references. QA suite validation enforces this.
confidence_propagation:
  rules:
    - from: "as-is-process-documentation:process_steps"
      to:
        - "dilo-observation:timeline"
        - "cx-journey-documentation:touchpoints"
        - "sipoc-analysis:process_mapping"
        - "target-state-documentation:asis_tobe_reconciliation"
      effect: "downstream_confidence <= upstream_confidence"

    - from: "as-is-process-documentation:pain_points"
      to:
        - "innovation-analysis-documentation:innovation_backlog"
        - "target-state-documentation:asis_tobe_reconciliation"
      effect: "downstream_confidence <= upstream_confidence"

    - from: "as-is-process-documentation:control_points"
      to:
        - "compliance-control-assessment:control_inventory"
        - "target-state-documentation:control_design"
      effect: "downstream_confidence <= upstream_confidence"

    - from: "cx-journey-documentation:touchpoints"
      to:
        - "target-state-documentation:cx_design"
      effect: "downstream_confidence <= upstream_confidence"

    - from: "cx-journey-documentation:friction_points"
      to:
        - "target-state-documentation:cx_design"
      effect: "downstream_confidence <= upstream_confidence"

  # Severity when a downstream section has higher confidence than its upstream source
  violation_severity: warning

# ──────────────────────────────────────────────
# Diagram Generation Rules
# ──────────────────────────────────────────────
diagrams:
  process_flow:
    type: mermaid_flowchart
    source: "as_is.process_steps"
    include_systems: true
    include_control_points: true

  swimlane:
    type: mermaid_swimlane
    source: "as_is.process_steps"
    lanes_by: "actor"

  journey_map:
    type: mermaid_journey
    source: "cx_journey.touchpoints"

  system_architecture:
    type: mermaid_c4
    source: "as_is.systems"

# ──────────────────────────────────────────────
# Change Log Format
# ──────────────────────────────────────────────
change_log:
  table_format: "| Version | Date | Contributor | Role | Changes |"
