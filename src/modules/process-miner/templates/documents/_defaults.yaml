# ProcessMiner Document Schema — Shared Defaults
# Imported by all per-document schema files.
# Single source of truth for confidence thresholds, incomplete markers,
# ID format conventions, and document statuses.
#
# USAGE: Each per-document schema references this file and inherits these
# defaults. Per-document schemas may override specific values (e.g. DILO
# adds "[PREFILLED" and "[EXPECTED" to incomplete_markers).

schema_format_version: "3.0"

# ──────────────────────────────────────────────
# Document Status Values
# ──────────────────────────────────────────────
document_statuses:
  - "DRAFT"
  - "IN_PROGRESS"
  - "REVIEW"
  - "APPROVED"
  - "ARCHIVED"

# ──────────────────────────────────────────────
# Confidence Scoring
# ──────────────────────────────────────────────
confidence_rules:
  high_threshold: 90
  medium_threshold: 70
  low_threshold: 40

  levels:
    - level: "HIGH"
      min_score: 90
      description: "Comprehensive coverage, validated by multiple sources"
    - level: "MEDIUM"
      min_score: 70
      description: "Good coverage, some details may need validation"
    - level: "LOW"
      min_score: 40
      description: "Preliminary capture, requires additional SME input"
    - level: "STUB"
      min_score: 0
      description: "Section placeholder only, no substantive content captured yet"

  # Display format for section footers
  display_format: "**Section Confidence:** {level} ({score}%) | **Basis:** {basis}"
  evidence_format: "**Evidence Sources:** {sources}"

  # Approval gate: section must reach this confidence to be approvable
  approval_threshold: 80

# ──────────────────────────────────────────────
# Incomplete Content Markers
# ──────────────────────────────────────────────
incomplete_markers:
  - "[TBD]"
  - "[Unknown]"
  - "[TODO]"
  - "{{.*}}"
  - "..."

# ──────────────────────────────────────────────
# Structured ID Format Convention
# ──────────────────────────────────────────────
# All IDs follow: {PREFIX}-{PROCESS_ABBREV}-{SEQ}
# - PREFIX: see registry below
# - PROCESS_ABBREV: 2-4 uppercase letters (e.g., ONB, KYC, CRO)
# - SEQ: 3-digit zero-padded number
id_format:
  pattern: "[A-Z]{1,4}-[A-Z]{2,4}-\\d{3}"
  example: "PS-ONB-001"

