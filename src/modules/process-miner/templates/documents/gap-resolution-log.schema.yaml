# Schema for Gap Resolution Log
# Merged schema v3.0 — single source of truth for this document type.
# Inherits shared defaults from _defaults.yaml.
#
# ARCHITECTURE: This replaces the former 2-layer split (master document-schema.yaml
# + per-doc companion). All section definitions, validation rules, field types,
# sync config, and cross-references for Gap Resolution Log live here.

schema_version: "3.0"
defaults: "_defaults.yaml"
template_name: "gap-resolution-log"
template_file: "gap-resolution-log.md"
template_description: "Validation gap tracking log with resolution history, iteration tracking, and risk assessment"
required: false

# ──────────────────────────────────────────────
# Sections
# ──────────────────────────────────────────────
sections:
  # ── Section 1: Gap Summary by Status ──
  - id: gap_summary
    heading: "1. Gap Summary by Status"
    section_number: 1
    content_type: summary_table
    item_prefix: "VG"
    sync_enabled: false
    subsections:
      - id: open_gaps
        heading: "1.1 Open Gaps"
        content_type: summary_table
        item_prefix: "VG"
        summary_table_header: "| VG# | Source | Gap Description | Severity | Days Open | Assigned To |"
      - id: in_progress_gaps
        heading: "1.2 In Progress Gaps"
        content_type: summary_table
        item_prefix: "VG"
        summary_table_header: "| VG# | Source | Gap Description | Severity | Resolution Approach | ETA |"
      - id: resolved_gaps
        heading: "1.3 Resolved Gaps"
        content_type: summary_table
        item_prefix: "VG"
        summary_table_header: "| VG# | Source | Gap Description | Resolution | Verified By | Date |"
      - id: deferred_gaps
        heading: "1.4 Deferred Gaps"
        content_type: summary_table
        item_prefix: "VG"
        summary_table_header: "| VG# | Source | Gap Description | Reason Deferred | Risk Owner | Review Date |"

  # ── Section 2: Detailed Gap Records ──
  - id: detailed_records
    heading: "2. Detailed Gap Records"
    section_number: 2
    content_type: detail_entries
    item_prefix: "VG"
    sync_enabled: false

  # ── Section 3: Gaps by Validation Area ──
  - id: gaps_by_area
    heading: "3. Gaps by Validation Area"
    section_number: 3
    content_type: mixed
    sync_enabled: false
    subsections:
      - id: control_validation_gaps
        heading: "3.1 Control Validation Gaps"
        content_type: item_list
        item_prefix: "VG"
      - id: cx_validation_gaps
        heading: "3.2 Client Experience Validation Gaps"
        content_type: item_list
        item_prefix: "VG"
      - id: innovation_validation_gaps
        heading: "3.3 Innovation Validation Gaps"
        content_type: item_list
        item_prefix: "VG"
      - id: process_validation_gaps
        heading: "3.4 Process Validation Gaps"
        content_type: item_list
        item_prefix: "VG"

  # ── Section 4: Validation Iteration History ──
  - id: iteration_history
    heading: "4. Validation Iteration History"
    section_number: 4
    content_type: summary_table
    sync_enabled: false
    summary_table_header: "| Iteration | Date | Gaps Raised | Gaps Resolved | Net Open | Status |"

  # ── Section 5: Gap Trends and Analysis ──
  - id: gap_trends
    heading: "5. Gap Trends and Analysis"
    section_number: 5
    content_type: analysis
    sync_enabled: false

  # ── Section 6: Deferred Gap Risk Register ──
  - id: deferred_risk_register
    heading: "6. Deferred Gap Risk Register"
    section_number: 6
    content_type: summary_table
    sync_enabled: false
    summary_table_header: "| VG# | Gap | Risk Level | Risk Owner | Mitigation | Review Date |"

  # ── Section 7: Gap Resolution Metrics ──
  - id: resolution_metrics
    heading: "7. Gap Resolution Metrics"
    section_number: 7
    content_type: statistics
    sync_enabled: false

# ──────────────────────────────────────────────
# Completeness Rules (validation gates)
# ──────────────────────────────────────────────
completeness:
  minimum:
    - "gap_summary.populated == true"
    - "detailed_records.count >= 1"
  recommended:
    - "iteration_history.populated == true"
    - "resolution_metrics.populated == true"

# ──────────────────────────────────────────────
# Cross-Reference Validation
# ──────────────────────────────────────────────
cross_references:
  inter_document:
    - description: "All VG# must correspond to validation gaps in Target State"
      source: "detailed_records.gap_id"
      target: "target-state-documentation.validation_gaps"

  required_references_by_section:
    1:  # Gap Summary
      - "VG#"
    2:  # Detailed Records
      - "VG#"
      - "TS#"
    3:  # Gaps by Area
      - "VG#"
    6:  # Risk Register
      - "VG#"

# ──────────────────────────────────────────────
# ID Patterns (document-specific subset)
# ──────────────────────────────────────────────
id_patterns:
  validation_gap: "VG-[A-Z]{2,4}-\\d{3}"

# ──────────────────────────────────────────────
# Companion Documents
# ──────────────────────────────────────────────
companion_documents:
  - name: "Target State Documentation"
    file: "target-state-documentation.md"
    relationship: "parent"
    sync_section: 13

  - name: "Transformation Decisions Detail"
    file: "transformation-decisions-detail.md"
    relationship: "sibling"

# ──────────────────────────────────────────────
# Gap Configuration
# ──────────────────────────────────────────────
gap_config:
  source_agents:
    - id: "control"
      name: "Control Analyst"
      focus: "Control compliance and regulatory gaps"

    - id: "cx"
      name: "Client Journey Analyst"
      focus: "Client experience and CES gaps"

    - id: "innovation"
      name: "Innovation Analyst"
      focus: "Innovation inclusion and feasibility gaps"

    - id: "process"
      name: "Process Documentation Analyst"
      focus: "Traceability and documentation gaps"

  severity_levels:
    - level: "Critical"
      description: "Blocks transformation approval, must be resolved"
      resolution_required: true
      target_resolution_days: 2

    - level: "High"
      description: "Significant issue, should be resolved before approval"
      resolution_required: true
      target_resolution_days: 5

    - level: "Medium"
      description: "Notable concern, resolution recommended"
      resolution_required: false
      target_resolution_days: 10

    - level: "Low"
      description: "Minor issue, can be deferred with justification"
      resolution_required: false
      target_resolution_days: null

  status_values:
    - id: "open"
      name: "Open"
      description: "Gap identified, resolution pending"

    - id: "in_progress"
      name: "In Progress"
      description: "Resolution being implemented"

    - id: "resolved"
      name: "Resolved"
      description: "Gap addressed, verified by source agent"

    - id: "deferred"
      name: "Deferred"
      description: "Gap accepted, resolution postponed with justification"

    - id: "rejected"
      name: "Rejected"
      description: "Gap disputed, not accepted as valid"

  resolution_types:
    - "Design Change"
    - "Documentation Update"
    - "Control Addition"
    - "Process Modification"
    - "Innovation Inclusion"
    - "Scope Adjustment"
    - "Risk Acceptance"

# ──────────────────────────────────────────────
# Metrics Configuration
# ──────────────────────────────────────────────
metrics:
  resolution_metrics:
    - name: "Average Resolution Time"
      field: "avg_resolution_time"
      unit: "days"
      target: 5

    - name: "First-Pass Resolution Rate"
      field: "first_pass_rate"
      unit: "percent"
      target: 80

    - name: "Critical Gap Resolution Time"
      field: "critical_resolution_time"
      unit: "days"
      target: 2

    - name: "Reopened Gap Rate"
      field: "reopened_rate"
      unit: "percent"
      target: 5

# ──────────────────────────────────────────────
# Risk Assessment (for deferred gaps)
# ──────────────────────────────────────────────
risk_assessment:
  likelihood_levels:
    - "Very Low"
    - "Low"
    - "Medium"
    - "High"
    - "Very High"

  impact_levels:
    - "Negligible"
    - "Minor"
    - "Moderate"
    - "Major"
    - "Severe"

  risk_matrix:
    very_low:
      negligible: "Very Low"
      minor: "Very Low"
      moderate: "Low"
      major: "Medium"
      severe: "Medium"
    low:
      negligible: "Very Low"
      minor: "Low"
      moderate: "Low"
      major: "Medium"
      severe: "High"
    medium:
      negligible: "Low"
      minor: "Low"
      moderate: "Medium"
      major: "High"
      severe: "High"
    high:
      negligible: "Low"
      minor: "Medium"
      moderate: "High"
      major: "High"
      severe: "Critical"
    very_high:
      negligible: "Medium"
      minor: "Medium"
      moderate: "High"
      major: "Critical"
      severe: "Critical"
